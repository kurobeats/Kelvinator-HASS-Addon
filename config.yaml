name: "Kelvinator Home Comfort"
version: "1.0.0"
slug: "kelvinator_home_comfort"
description: "Control Kelvinator air conditioners via BroadLink cloud and LAN"
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
hassio_api: true
hassio_role: default
host_network: true
auth_api: true
mqtt: true
options:
  username:
    description: "Kelvinator app username (phone or email)"
    required: true
  password:
    description: "Kelvinator app password"
    required: true
  country_code:
    description: "Country code for phone login (e.g. 61 for AU, 64 for NZ)"
    required: false
    default: "61"
  poll_interval:
    description: "Status poll interval in seconds"
    required: false
    default: 30
  mqtt_host:
    description: "MQTT broker host (leave empty for HA internal broker)"
    required: false
    default: ""
  mqtt_port:
    description: "MQTT broker port"
    required: false
    default: 1883
  mqtt_username:
    description: "MQTT broker username (leave empty for HA internal broker)"
    required: false
    default: ""
  mqtt_password:
    description: "MQTT broker password (leave empty for HA internal broker)"
    required: false
    default: ""
  mqtt_discovery_prefix:
    description: "MQTT discovery prefix"
    required: false
    default: "homeassistant"
  debug:
    description: "Enable debug logging"
    required: false
    default: false
schema:
  username: str
  password: str
  country_code: str
  poll_interval: int(5,300)
  mqtt_host: str
  mqtt_port: int(1,65535)
  mqtt_username: str
  mqtt_password: password
  mqtt_discovery_prefix: str
  debug: bool
startup: "application"
init: false
map:
  - config:rw
